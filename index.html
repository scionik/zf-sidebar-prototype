<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zugerberg Finanz – Sidebar Resize</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Metric', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-synthesis: none;
    }

    /* ── App shell ── */
    .app {
      width: 1280px;
      height: 760px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.12), 0 1px 3px rgba(0,0,0,0.06);
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 256px;
      min-width: 57px;
      max-width: 340px;
      background: #FAFAFA;
      border-right: 0.5px solid #EBEBEB;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 12px 8px 8px;
      gap: 32px;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
      user-select: none;
      transition: width 80ms ease;
    }

    /* ── Resize handle ── */
    .resize-handle {
      position: absolute;
      top: 0;
      right: -4px;
      width: 8px;
      height: 100%;
      cursor: col-resize;
      z-index: 20;
    }

    .resize-handle::after {
      content: '';
      position: absolute;
      top: 0;
      left: 3px;
      width: 2px;
      height: 100%;
      background: transparent;
      border-radius: 1px;
      transition: background 120ms ease;
    }

    .sidebar:hover .resize-handle::after,
    .resize-handle.dragging::after {
      background: #004A86;
      opacity: 0.5;
    }

    .resize-handle.dragging::after {
      opacity: 1;
      width: 3px;
      left: 2.5px;
    }

    /* ── Header (logo + name) ── */
    .sidebar-header {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 4px;
      padding: 8px 12px;
      flex-shrink: 0;
      background: #FAFAFA;
      overflow: hidden;
      white-space: nowrap;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
      overflow: hidden;
    }

    .logo-icon {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      flex-shrink: 0;
      overflow: hidden;
    }

    .company-name {
      font-family: 'Metric Medium', 'Metric', system-ui, -apple-system, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 20px;
      letter-spacing: -0.3px;
      color: #000;
      white-space: nowrap;
      overflow: hidden;
      transition: opacity 100ms ease, width 100ms ease;
    }

    .header-chevron {
      flex-shrink: 0;
      transition: opacity 100ms ease;
    }

    /* ── Search ── */
    .sidebar-search {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      background: #fff;
      outline: 0.5px solid #E2E2E2;
      outline-offset: -0.5px;
      border-radius: 4px;
      flex-shrink: 0;
      overflow: hidden;
      white-space: nowrap;
    }

    .search-prefix {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 12px;
      gap: 8px;
      background: #fff;
    }

    .search-body {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 8px;
      gap: 8px;
      background: #fff;
      min-width: 0;
    }

    .search-placeholder {
      font-family: 'Metric', system-ui, sans-serif;
      font-size: 16px;
      line-height: 20px;
      letter-spacing: -0.3px;
      color: #AFAFAF;
      white-space: nowrap;
      overflow: hidden;
      transition: opacity 100ms ease;
    }

    .search-suffix {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-right: 12px;
      background: #fff;
      flex-shrink: 0;
      transition: opacity 100ms ease;
    }

    .kbd {
      height: 20px;
      min-width: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      padding: 2px 4px;
      gap: 4px;
      background: #FAFAFA;
      border: 0.5px solid #EBEBEB;
      font-family: 'Metric', system-ui, sans-serif;
      font-size: 14px;
      line-height: 18px;
      letter-spacing: -0.3px;
      color: #AFAFAF;
    }

    /* ── Nav ── */
    .nav {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .nav-item {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      border-radius: 4px;
      padding: 0 12px;
      flex-shrink: 0;
      cursor: pointer;
      gap: 8px;
      white-space: nowrap;
      overflow: hidden;
    }

    .nav-item:hover { background: #F0F0F0; }

    .nav-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .nav-label {
      font-family: 'Metric', system-ui, sans-serif;
      font-size: 16px;
      line-height: 100%;
      letter-spacing: -0.3px;
      color: #000;
      white-space: nowrap;
      overflow: hidden;
      flex: 1;
      transition: opacity 100ms ease;
    }

    .nav-chevron {
      flex-shrink: 0;
      transition: opacity 100ms ease;
    }

    /* ── Footer ── */
    .sidebar-footer {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-radius: 4px;
      padding: 8px 12px;
      flex-shrink: 0;
      background: #FAFAFA;
      overflow: hidden;
      white-space: nowrap;
    }

    .footer-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
      overflow: hidden;
    }

    .avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex-shrink: 0;
      overflow: hidden;
      background-image: url('https://app.paper.design/file-assets/01KSR3DM8GDEQBDJW0JT6BR0D3/2JCFY9B9H7T2MJMEWMSNZDZJ31.png');
      background-size: 179.17% 268.75%;
      background-position: 61.3% 6.82%;
      background-repeat: no-repeat;
      background-color: #c8d8e8;
    }

    .user-name {
      font-family: 'Metric Medium', 'Metric', system-ui, sans-serif;
      font-weight: 500;
      font-size: 16px;
      line-height: 20px;
      letter-spacing: -0.3px;
      color: #000;
      white-space: nowrap;
      overflow: hidden;
      transition: opacity 100ms ease;
    }

    .footer-dots {
      flex-shrink: 0;
      transition: opacity 100ms ease;
    }

    /* ── Collapsed state ── */
    .sidebar.collapsed .company-name,
    .sidebar.collapsed .header-chevron,
    .sidebar.collapsed .search-placeholder,
    .sidebar.collapsed .search-suffix,
    .sidebar.collapsed .nav-label,
    .sidebar.collapsed .nav-chevron,
    .sidebar.collapsed .user-name,
    .sidebar.collapsed .footer-dots {
      opacity: 0;
      pointer-events: none;
    }

    .sidebar.collapsed .sidebar-header { justify-content: center; padding: 8px; }
    .sidebar.collapsed .sidebar-search { justify-content: center; }
    .sidebar.collapsed .search-prefix { padding-left: 0; padding: 0 12px; }
    .sidebar.collapsed .nav-item { justify-content: center; padding: 0 12px; }
    .sidebar.collapsed .sidebar-footer { justify-content: center; padding: 8px; }

    /* ── Main content ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 8px;
      gap: 8px;
      flex-shrink: 0;
      background: #FAFAFA;
      overflow: hidden;
    }

    .main-content {
      flex: 1;
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0px 1px 2px #0000000F, 0px 0px 1px #0000000F;
      background: #fff;
      outline: 0.5px solid #EBEBEB;
      outline-offset: -0.5px;
    }
  </style>
</head>

<script>
  const sidebar = document.getElementById('sidebar');
  const handle  = document.getElementById('resizeHandle');

  const FULL_WIDTH      = 256;
  const COLLAPSED_WIDTH = 57;
  const SNAP_THRESHOLD  = 120; // collapse if dragged below this

  let isDragging = false;
  let startX     = 0;
  let startWidth = 0;

  handle.addEventListener('mousedown', (e) => {
    isDragging  = true;
    startX      = e.clientX;
    startWidth  = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor    = 'col-resize';
    document.body.style.userSelect = 'none';
    sidebar.style.transition = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const delta    = e.clientX - startX;
    const newWidth = Math.max(COLLAPSED_WIDTH, Math.min(340, startWidth + delta));
    sidebar.style.width = newWidth + 'px';

    if (newWidth <= SNAP_THRESHOLD) {
      sidebar.classList.add('collapsed');
    } else {
      sidebar.classList.remove('collapsed');
    }
  });

  document.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
    sidebar.style.transition = '';

    const w = sidebar.offsetWidth;
    if (w <= SNAP_THRESHOLD) {
      sidebar.style.width = COLLAPSED_WIDTH + 'px';
      sidebar.classList.add('collapsed');
    }
  });

  /* Double-click handle to toggle */
  handle.addEventListener('dblclick', () => {
    if (sidebar.classList.contains('collapsed')) {
      sidebar.style.width = FULL_WIDTH + 'px';
      sidebar.classList.remove('collapsed');
    } else {
      sidebar.style.width = COLLAPSED_WIDTH + 'px';
      sidebar.classList.add('collapsed');
    }
  });
</script>
